<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ชำระเงิน</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


    <div class="bill-card">


        <h2>
            💳 ชำระเงิน
        </h2>


        <hr>


        <h3 id="title">
            กำลังโหลด...
        </h3>



        <p>
            💰 จำนวนเงิน
        </p>


        <h1 style="text-align:center;color:#06c755;">

            <span id="amount">
                -
            </span>

            บาท

        </h1>



        <p style="text-align:center;">

            📅 ครบกำหนด

            <br>

            <b id="dueDate">
                -
            </b>

        </p>


    </div>





    <div class="bill-card">


        <h3>
            📱 QR พร้อมเพย์
        </h3>



        <img

            id="qrImage"

            src=""

            width="250"

            alt="QR Code">


        <p style="text-align:center;color:#777;">

            สแกน QR เพื่อชำระเงิน

        </p>



    </div>







    <div class="bill-card">


        <h3>
            📤 แนบหลักฐานการชำระเงิน
        </h3>



        <input

            type="file"

            id="slip"

            accept="image/*">





        <br><br>



        <img

            id="preview"

            src=""

            style="
            display:none;
            width:100%;
            border-radius:20px;
            ">




        <br><br>



        <button onclick="uploadPayment()">

            ✅ ส่งสลิป

        </button>



    </div>





</div>





<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/bill.js"></script>

<script src="js/upload.js"></script>


</body>

</html>
